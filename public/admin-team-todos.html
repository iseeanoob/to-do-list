<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Team Todos | Node Docker App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
  <div class="container">
    <h1>📋 Collaboration Todo Board (Admin)</h1>
    <div class="admin-top-actions">
      <button type="button" id="backToAdminBtn" class="back-to-todos-btn">⬅ Back to Admin</button>
      <button type="button" id="openClaimPageBtn" class="back-to-todos-btn">🙋 Open Claim Page</button>
    </div>

    <form id="teamTodoForm">
      <input type="text" id="teamTodoTitleInput" placeholder="Todo title..." required />
      <input type="text" id="teamTodoDescriptionInput" placeholder="Optional details..." />
      <select id="teamTodoDifficultyInput">
        <option value="easy">easy</option>
        <option value="medium">medium</option>
        <option value="hard">hard</option>
        <option value="insane">insane</option>
      </select>
      <input type="number" id="teamTodoMaxTeamSizeInput" min="1" max="20" value="3" />
      <button type="submit">Create collaboration todo</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Todo</th>
          <th>Difficulty</th>
          <th>Status</th>
          <th>Participants</th>
          <th>Messages</th>
          <th>Created By</th>
          <th>Progress</th>
          <th>Team Members</th>
        </tr>
      </thead>
      <tbody id="teamTodoTable"></tbody>
    </table>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const MIN_ADMIN_ROLE_LEVEL = 4;
    const TODO_DIFFICULTIES = ["easy", "medium", "hard", "insane"];
    const TEAM_TODO_COLUMN_COUNT = 8;
    const backToAdminBtn = document.getElementById("backToAdminBtn");
    const openClaimPageBtn = document.getElementById("openClaimPageBtn");
    const teamTodoForm = document.getElementById("teamTodoForm");
    const teamTodoTitleInput = document.getElementById("teamTodoTitleInput");
    const teamTodoDescriptionInput = document.getElementById("teamTodoDescriptionInput");
    const teamTodoDifficultyInput = document.getElementById("teamTodoDifficultyInput");
    const teamTodoMaxTeamSizeInput = document.getElementById("teamTodoMaxTeamSizeInput");
    const teamTodoTable = document.getElementById("teamTodoTable");
    let adminUsers = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    if (!token) window.location.href = "login.html";
    let decoded = null;
    try {
      decoded = JSON.parse(atob(token.split(".")[1]));
    } catch {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }
    if (!decoded || Number(decoded.role) < MIN_ADMIN_ROLE_LEVEL) {
      window.location.href = "todos.html";
    }

    backToAdminBtn.addEventListener("click", () => {
      window.location.href = "admin.html";
    });
    openClaimPageBtn.addEventListener("click", () => {
      window.location.href = "claim-todos.html";
    });

    function buildUserOptionsHtml(selectedUserId = "") {
      if (!adminUsers.length) return `<option value="">No users available</option>`;
      return [
        `<option value="">Select user</option>`,
        ...adminUsers.map((user) => {
          const selected = Number(selectedUserId) === Number(user.id) ? " selected" : "";
          return `<option value="${Number(user.id)}"${selected}>${escapeHtml(user.username)} (#${Number(user.id)})</option>`;
        })
      ].join("");
    }

    async function fetchAdminUsers() {
      const res = await fetch("/admin/users-todos", {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json().catch(() => []);
      if (!res.ok) throw new Error(data.error || "Failed to load users.");
      adminUsers = Array.isArray(data)
        ? data
            .map((item) => ({
              id: Number(item.id),
              username: String(item.username || "Unknown")
            }))
            .filter((item) => Number.isInteger(item.id) && item.id > 0)
        : [];
    }

    async function fetchTeamMembers(teamTodoId) {
      const res = await fetch(`/team-todos/${teamTodoId}/members`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json().catch(() => []);
      if (!res.ok) throw new Error(data.error || "Failed to load team members.");
      return Array.isArray(data) ? data : [];
    }

    function renderTeamMembersCell(teamTodoId, members) {
      const host = document.getElementById(`teamMembersCell-${teamTodoId}`);
      if (!host) return;
      const membersHtml = members.length
        ? members.map((member) => `
            <div class="team-member-row">
              <span>${escapeHtml(member.username || "Unknown")} (#${Number(member.user_id)})</span>
              <button
                type="button"
                class="action delete"
                data-action="remove-member"
                data-team-todo-id="${Number(teamTodoId)}"
                data-user-id="${Number(member.user_id)}"
              >Remove</button>
            </div>
          `).join("")
        : "<em>No members yet.</em>";
      host.innerHTML = `
        <div class="team-member-admin-list">${membersHtml}</div>
        <div class="team-member-admin-controls">
          <select class="team-member-user-select" data-team-todo-id="${Number(teamTodoId)}">
            ${buildUserOptionsHtml()}
          </select>
          <button
            type="button"
            class="action assign"
            data-action="add-member"
            data-team-todo-id="${Number(teamTodoId)}"
          >Add user</button>
        </div>
      `;
    }

    async function hydrateAllTeamMembers(items) {
      await Promise.all(
        items.map(async (item) => {
          const teamTodoId = Number(item.id);
          if (!Number.isInteger(teamTodoId) || teamTodoId <= 0) return;
          try {
            const members = await fetchTeamMembers(teamTodoId);
            renderTeamMembersCell(teamTodoId, members);
          } catch (err) {
            const host = document.getElementById(`teamMembersCell-${teamTodoId}`);
            if (host) host.innerHTML = "<em>Failed to load team members.</em>";
          }
        })
      );
    }

    async function addMemberToTeamTodo(teamTodoId) {
      const select = teamTodoTable.querySelector(`select.team-member-user-select[data-team-todo-id="${teamTodoId}"]`);
      if (!select) return;
      const userId = Number.parseInt(select.value, 10);
      if (!Number.isInteger(userId) || userId <= 0) {
        alert("Select a valid user first.");
        return;
      }
      try {
        const res = await fetch(`/admin/team-todos/${teamTodoId}/members`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ userId })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Failed to add member.");
        await fetchTeamTodos();
      } catch (err) {
        alert(err.message);
      }
    }

    async function removeMemberFromTeamTodo(teamTodoId, userId) {
      if (!confirm("Remove this user from the team todo?")) return;
      try {
        const res = await fetch(`/admin/team-todos/${teamTodoId}/members/${userId}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Failed to remove member.");
        await fetchTeamTodos();
      } catch (err) {
        alert(err.message);
      }
    }

    async function fetchTeamTodos() {
      try {
        const res = await fetch("/admin/team-todos", {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json().catch(() => []);
        if (!res.ok) throw new Error(data.error || "Failed to load team todos.");
        renderTeamTodos(data);
        await hydrateAllTeamMembers(data);
      } catch (err) {
        alert(err.message);
      }
    }

    function renderTeamTodos(items) {
      teamTodoTable.innerHTML = "";
      if (!items.length) {
        teamTodoTable.innerHTML = `<tr><td colspan="${TEAM_TODO_COLUMN_COUNT}"><em>No team todos yet.</em></td></tr>`;
        return;
      }
      items.forEach((item) => {
        const todoText = item.description
          ? `${escapeHtml(item.title)} — ${escapeHtml(item.description)}`
          : escapeHtml(item.title);
        const memberCount = Number(item.member_count || 0);
        const maxTeamSize = Number(item.max_team_size || 3);
        const claimedBy = item.claimed_by_username
          ? `${escapeHtml(item.claimed_by_username)}${item.claimed_todo_id ? ` (todo #${item.claimed_todo_id})` : ""}`
          : "-";
        const completedBy = item.completed_by_username
          ? `${escapeHtml(item.completed_by_username)}${item.completed_at ? ` (${new Date(item.completed_at).toLocaleString()})` : ""}`
          : "";
        const statusText = item.status === "completed"
          ? "completed"
          : memberCount > 0
            ? "in progress"
            : "open";
        const progressText = item.status === "completed"
          ? `Done by ${completedBy || "member"}${item.completion_notes ? ` — ${escapeHtml(item.completion_notes)}` : ""}`
          : claimedBy;
        teamTodoTable.innerHTML += `
          <tr>
            <td>${todoText}</td>
            <td>${escapeHtml(item.difficulty || "easy")}</td>
            <td>${escapeHtml(statusText)}</td>
            <td>${memberCount} / ${maxTeamSize}</td>
            <td>${Number(item.message_count || 0)}</td>
            <td>${escapeHtml(item.created_by_username || "Unknown")}</td>
            <td>${progressText}</td>
            <td id="teamMembersCell-${Number(item.id)}"><em>Loading team members...</em></td>
          </tr>
        `;
      });
    }

    teamTodoForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const title = teamTodoTitleInput.value.trim();
      const description = teamTodoDescriptionInput.value.trim();
      const difficulty = String(teamTodoDifficultyInput.value || "").trim().toLowerCase();
      const maxTeamSize = Number.parseInt(teamTodoMaxTeamSizeInput.value, 10);
      if (!title) return;
      if (!TODO_DIFFICULTIES.includes(difficulty)) {
        alert("Choose a valid difficulty.");
        return;
      }
      if (!Number.isInteger(maxTeamSize) || maxTeamSize < 1 || maxTeamSize > 20) {
        alert("Max team size must be between 1 and 20.");
        return;
      }
      try {
        const res = await fetch("/admin/team-todos", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ title, description, difficulty, maxTeamSize })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Failed to create team todo.");
        teamTodoTitleInput.value = "";
        teamTodoDescriptionInput.value = "";
        teamTodoDifficultyInput.value = "easy";
        teamTodoMaxTeamSizeInput.value = "3";
        fetchTeamTodos();
      } catch (err) {
        alert(err.message);
      }
    });

    teamTodoTable.addEventListener("click", (event) => {
      const addButton = event.target.closest("button[data-action='add-member']");
      if (addButton) {
        const teamTodoId = Number(addButton.dataset.teamTodoId);
        if (!Number.isInteger(teamTodoId) || teamTodoId <= 0) return;
        addMemberToTeamTodo(teamTodoId);
        return;
      }
      const removeButton = event.target.closest("button[data-action='remove-member']");
      if (removeButton) {
        const teamTodoId = Number(removeButton.dataset.teamTodoId);
        const userId = Number(removeButton.dataset.userId);
        if (!Number.isInteger(teamTodoId) || teamTodoId <= 0) return;
        if (!Number.isInteger(userId) || userId <= 0) return;
        removeMemberFromTeamTodo(teamTodoId, userId);
      }
    });

    (async () => {
      try {
        await fetchAdminUsers();
        await fetchTeamTodos();
      } catch (err) {
        alert(err.message);
      }
    })();
  </script>
  <script src="profile-menu.js"></script>
</body>
</html>
