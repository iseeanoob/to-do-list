<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Todos | Node Docker App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="todos-page">
  <div class="xp-progress-wrap">
    <div class="xp-progress-meta">
      <strong id="levelLabel">Level 1</strong>
      <span id="xpLabel">0 / 10 XP</span>
    </div>
    <div class="xp-progress-track">
      <div class="xp-progress-fill" id="xpProgressFill"></div>
    </div>
  </div>
  <div class="container">
    <h1>📝 My Todos</h1>
    <p>Click a todo to request completion (with notes), or use the icon to remove it.</p>

    <form id="todoForm">
      <input type="text" id="todoInput" placeholder="New todo..." required />
      <select id="todoDifficultyInput">
        <option value="easy">easy</option>
        <option value="medium">medium</option>
        <option value="hard">hard</option>
        <option value="insane">insane</option>
      </select>
      <button type="submit">Add Todo</button>
    </form>
    <div id="adminNavWrap" style="display: none;">
      <button type="button" id="goToAdminBtn">Go to Admin Panel</button>
    </div>
    <div id="claimNavWrap">
      <button type="button" id="goToClaimTodosBtn">Claim Team Todos</button>
    </div>

    <h3>Unfinished</h3>
    <ul id="todoListUnfinished"></ul>
    <h3>Awaiting Approval</h3>
    <ul id="todoListPendingApproval"></ul>
    <h3>Finished</h3>
    <ul id="todoListFinished"></ul>
    <h3>My Todo Requests</h3>
    <form id="todoRequestForm">
      <input type="text" id="todoRequestInput" placeholder="Request a todo..." required />
      <select id="todoRequestDifficultyInput">
        <option value="easy">easy</option>
        <option value="medium">medium</option>
        <option value="hard">hard</option>
        <option value="insane">insane</option>
      </select>
      <button type="submit">Send Request</button>
    </form>
    <ul id="todoRequestList"></ul>
    <p id="errorMsg" class="error"></p>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";
    }

    const todoListUnfinished = document.getElementById("todoListUnfinished");
    const todoListPendingApproval = document.getElementById("todoListPendingApproval");
    const todoListFinished = document.getElementById("todoListFinished");
    const todoForm = document.getElementById("todoForm");
    const todoInput = document.getElementById("todoInput");
    const todoDifficultyInput = document.getElementById("todoDifficultyInput");
    const todoRequestForm = document.getElementById("todoRequestForm");
    const todoRequestInput = document.getElementById("todoRequestInput");
    const todoRequestDifficultyInput = document.getElementById("todoRequestDifficultyInput");
    const todoRequestList = document.getElementById("todoRequestList");
    const errorMsg = document.getElementById("errorMsg");
    const adminNavWrap = document.getElementById("adminNavWrap");
    const goToAdminBtn = document.getElementById("goToAdminBtn");
    const claimNavWrap = document.getElementById("claimNavWrap");
    const goToClaimTodosBtn = document.getElementById("goToClaimTodosBtn");
    const levelLabel = document.getElementById("levelLabel");
    const xpLabel = document.getElementById("xpLabel");
    const xpProgressFill = document.getElementById("xpProgressFill");
    const MIN_ADMIN_ROLE_LEVEL = 4;
    const SUPERADMIN_ROLE_LEVEL = 5;
    const TODO_DIFFICULTIES = ["easy", "medium", "hard", "insane"];

    // Decode token to get username/email
    function parseJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch (e) {
        return null;
      }
    }

    const user = parseJwt(token);
    if (!user) {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }
    if (Number(user.role) >= MIN_ADMIN_ROLE_LEVEL) {
      adminNavWrap.style.display = "block";
      goToAdminBtn.addEventListener("click", () => {
        window.location.href = "admin.html";
      });
    }
    claimNavWrap.style.display = "block";
    goToClaimTodosBtn.addEventListener("click", () => {
      window.location.href = "claim-todos.html";
    });

    function renderProgress(profile) {
      const level = Math.max(1, Number(profile?.level) || 1);
      const currentXp = Math.max(0, Number(profile?.xp) || 0);
      const nextLevelXp = Math.max(10, Number(profile?.nextLevelXp) || 10);
      const percent = Math.min(100, Math.round((currentXp / nextLevelXp) * 100));
      levelLabel.textContent = `Level ${level}`;
      xpLabel.textContent = `${currentXp} / ${nextLevelXp} XP`;
      xpProgressFill.style.width = `${percent}%`;
    }

    async function fetchProgress() {
      try {
        const res = await fetch("/me", {
          headers: { Authorization: "Bearer " + token }
        });
        if (!res.ok) return;
        const profile = await res.json();
        renderProgress(profile);
      } catch (err) {
        console.error(err);
      }
    }

    async function fetchTodos() {
      try {
        const res = await fetch("/todos", {
          headers: { Authorization: "Bearer " + token }
        });
        const todos = await res.json();
        renderTodos(todos);
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to load todos.";
      }
    }

    async function fetchTodoRequests() {
      try {
        const res = await fetch("/todo-requests", {
          headers: { Authorization: "Bearer " + token }
        });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          errorMsg.textContent = errData.error || "Failed to load todo requests.";
          return;
        }
        const requests = await res.json();
        renderTodoRequests(requests);
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to load todo requests.";
      }
    }

    function renderTodoRequests(requests) {
      todoRequestList.innerHTML = "";
      requests.forEach((request) => {
        const li = document.createElement("li");
        li.textContent = `${request.title} (${request.difficulty || "easy"}, ${request.status || "pending"})`;
        todoRequestList.appendChild(li);
      });
    }

    function renderTodos(todos) {
      todoListUnfinished.innerHTML = "";
      todoListPendingApproval.innerHTML = "";
      todoListFinished.innerHTML = "";

      const unfinished = todos.filter((todo) => !todo.completed && !todo.completion_requested);
      const pendingApproval = todos.filter((todo) => !todo.completed && Boolean(todo.completion_requested));
      const finished = todos.filter((todo) => Boolean(todo.completed));

      function renderItem(todo, targetList) {
        const li = document.createElement("li");
        const assignedByAdmin = Number(todo.assigned_by_role) >= MIN_ADMIN_ROLE_LEVEL;
        const assignedByText = assignedByAdmin
          ? `Assigned by ${Number(todo.assigned_by_role) === SUPERADMIN_ROLE_LEVEL ? "Superadmin" : "Admin"}`
          : "Self";
        const difficulty = String(todo.difficulty || "easy");
        const statusText = todo.completed
          ? "Approved"
          : todo.completion_requested
            ? "Awaiting approval"
            : "Open";
        const completionNotes = String(todo.completion_notes || "").trim();
        const completionNotesSuffix = completionNotes ? `, Notes: ${completionNotes}` : "";
        li.textContent = `${todo.title} (${difficulty}, ${assignedByText}, ${statusText}${completionNotesSuffix})`;
        li.style.textDecoration = todo.completed ? "line-through" : "none";

        // Toggle complete
        li.addEventListener("click", async () => {
          const desiredCompleted = !todo.completed && !todo.completion_requested;
          const completionNotes = desiredCompleted
            ? String(prompt("How did you do it? (optional)") || "").trim()
            : "";
          try {
            const updateRes = await fetch(`/todos/${todo.id}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token
              },
              body: JSON.stringify({ title: todo.title, completed: desiredCompleted, completionNotes })
            });
            if (!updateRes.ok) {
              const errData = await updateRes.json().catch(() => ({}));
              errorMsg.textContent = errData.error || "Failed to update todo.";
              return;
            }
            {
              const updateData = await updateRes.json();
              const updatedLevel = Number(updateData.level);
              if (Number.isInteger(updatedLevel) && updatedLevel >= 1) {
                renderProgress(updateData);
              }
            }
            fetchTodos();
          } catch (err) {
            console.error(err);
          }
        });

        // Delete button
        const delBtn = document.createElement("button");
        delBtn.textContent = "🗑️";
        delBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          try {
            await fetch(`/todos/${todo.id}`, {
              method: "DELETE",
              headers: { Authorization: "Bearer " + token }
            });
            fetchTodos();
          } catch (err) {
            console.error(err);
          }
        });

        li.appendChild(delBtn);

        const canChangeDifficulty = !assignedByAdmin && !todo.completed && !todo.completion_requested;
        if (canChangeDifficulty) {
          const difficultySelect = document.createElement("select");
          TODO_DIFFICULTIES.forEach((difficultyOption) => {
            const option = document.createElement("option");
            option.value = difficultyOption;
            option.textContent = difficultyOption;
            if (difficultyOption === difficulty) option.selected = true;
            difficultySelect.appendChild(option);
          });
          difficultySelect.addEventListener("click", (event) => event.stopPropagation());

          const saveDifficultyBtn = document.createElement("button");
          saveDifficultyBtn.type = "button";
          saveDifficultyBtn.textContent = "Save difficulty";
          saveDifficultyBtn.addEventListener("click", async (event) => {
            event.stopPropagation();
            const selectedDifficulty = (difficultySelect.value || "").trim().toLowerCase();
            if (!TODO_DIFFICULTIES.includes(selectedDifficulty)) {
              errorMsg.textContent = "Choose a valid difficulty.";
              return;
            }
            try {
              const res = await fetch(`/todos/${todo.id}`, {
                method: "PUT",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: "Bearer " + token
                },
                body: JSON.stringify({ difficulty: selectedDifficulty })
              });
              const data = await res.json().catch(() => ({}));
              if (!res.ok) {
                errorMsg.textContent = data.error || "Failed to update difficulty.";
                return;
              }
              fetchTodos();
            } catch (err) {
              console.error(err);
              errorMsg.textContent = "Failed to update difficulty.";
            }
          });

          li.appendChild(difficultySelect);
          li.appendChild(saveDifficultyBtn);
        }
        targetList.appendChild(li);
      }

      unfinished.forEach((todo) => renderItem(todo, todoListUnfinished));
      pendingApproval.forEach((todo) => renderItem(todo, todoListPendingApproval));
      finished.forEach((todo) => renderItem(todo, todoListFinished));
    }

    // Add new todo
    todoForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = todoInput.value.trim();
      const difficulty = (todoDifficultyInput?.value || "").trim().toLowerCase();
      if (!title) return;
      if (!TODO_DIFFICULTIES.includes(difficulty)) {
        errorMsg.textContent = "Please choose a valid difficulty.";
        return;
      }

      try {
        await fetch("/todos", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ title, difficulty })
        });
        todoInput.value = "";
        todoDifficultyInput.value = "easy";
        fetchTodos();
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to add todo.";
      }
    });

    todoRequestForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = todoRequestInput.value.trim();
      const difficulty = (todoRequestDifficultyInput?.value || "").trim().toLowerCase();
      if (!title) return;
      if (!TODO_DIFFICULTIES.includes(difficulty)) {
        errorMsg.textContent = "Please choose a valid request difficulty.";
        return;
      }

      try {
        const res = await fetch("/todo-requests", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ title, difficulty })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errorMsg.textContent = data.error || "Failed to send todo request.";
          return;
        }
        todoRequestInput.value = "";
        todoRequestDifficultyInput.value = "easy";
        fetchTodoRequests();
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to send todo request.";
      }
    });

    // Initial fetch
    fetchProgress();
    fetchTodos();
    fetchTodoRequests();
  </script>
  <script src="profile-menu.js"></script>
</body>
</html>
