<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Todos | Node Docker App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="xp-progress-wrap">
    <div class="xp-progress-meta">
      <strong id="levelLabel">Level 1</strong>
      <span id="xpLabel">0 / 10 XP</span>
    </div>
    <div class="xp-progress-track">
      <div class="xp-progress-fill" id="xpProgressFill"></div>
    </div>
  </div>
  <div class="container">
    <h1>📝 My Todos</h1>
    <p>Click a todo to request completion, or use the icon to remove it.</p>

    <form id="todoForm">
      <input type="text" id="todoInput" placeholder="New todo..." required />
      <button type="submit">Add Todo</button>
    </form>
    <div id="adminNavWrap" style="display: none; margin-top: 10px;">
      <button type="button" id="goToAdminBtn">Go to Admin Panel</button>
    </div>

    <h3>Unfinished</h3>
    <ul id="todoListUnfinished"></ul>
    <h3>Awaiting Approval</h3>
    <ul id="todoListPendingApproval"></ul>
    <h3>Finished</h3>
    <ul id="todoListFinished"></ul>
    <p id="errorMsg" class="error"></p>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";
    }

    const todoListUnfinished = document.getElementById("todoListUnfinished");
    const todoListPendingApproval = document.getElementById("todoListPendingApproval");
    const todoListFinished = document.getElementById("todoListFinished");
    const todoForm = document.getElementById("todoForm");
    const todoInput = document.getElementById("todoInput");
    const errorMsg = document.getElementById("errorMsg");
    const adminNavWrap = document.getElementById("adminNavWrap");
    const goToAdminBtn = document.getElementById("goToAdminBtn");
    const levelLabel = document.getElementById("levelLabel");
    const xpLabel = document.getElementById("xpLabel");
    const xpProgressFill = document.getElementById("xpProgressFill");
    const MIN_ADMIN_ROLE_LEVEL = 4;
    const SUPERADMIN_ROLE_LEVEL = 5;

    // Decode token to get username/email
    function parseJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch (e) {
        return null;
      }
    }

    const user = parseJwt(token);
    if (!user) {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }
    if (Number(user.role) >= MIN_ADMIN_ROLE_LEVEL) {
      adminNavWrap.style.display = "block";
      goToAdminBtn.addEventListener("click", () => {
        window.location.href = "admin.html";
      });
    }

    function renderProgress(profile) {
      const level = Math.max(1, Number(profile?.level) || 1);
      const currentXp = Math.max(0, Number(profile?.xp) || 0);
      const nextLevelXp = Math.max(10, Number(profile?.nextLevelXp) || 10);
      const percent = Math.min(100, Math.round((currentXp / nextLevelXp) * 100));
      levelLabel.textContent = `Level ${level}`;
      xpLabel.textContent = `${currentXp} / ${nextLevelXp} XP`;
      xpProgressFill.style.width = `${percent}%`;
    }

    async function fetchProgress() {
      try {
        const res = await fetch("/me", {
          headers: { Authorization: "Bearer " + token }
        });
        if (!res.ok) return;
        const profile = await res.json();
        renderProgress(profile);
      } catch (err) {
        console.error(err);
      }
    }

    async function fetchTodos() {
      try {
        const res = await fetch("/todos", {
          headers: { Authorization: "Bearer " + token }
        });
        const todos = await res.json();
        renderTodos(todos);
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to load todos.";
      }
    }

    function renderTodos(todos) {
      todoListUnfinished.innerHTML = "";
      todoListPendingApproval.innerHTML = "";
      todoListFinished.innerHTML = "";

      const unfinished = todos.filter((todo) => !todo.completed && !todo.completion_requested);
      const pendingApproval = todos.filter((todo) => !todo.completed && Boolean(todo.completion_requested));
      const finished = todos.filter((todo) => Boolean(todo.completed));

      function renderItem(todo, targetList) {
        const li = document.createElement("li");
        const assignedByAdmin = Number(todo.assigned_by_role) >= MIN_ADMIN_ROLE_LEVEL;
        const assignedByText = assignedByAdmin
          ? `Assigned by ${Number(todo.assigned_by_role) === SUPERADMIN_ROLE_LEVEL ? "Superadmin" : "Admin"}`
          : "Self";
        const difficulty = String(todo.difficulty || "easy");
        const statusText = todo.completed
          ? "Approved"
          : todo.completion_requested
            ? "Awaiting approval"
            : "Open";
        li.textContent = `${todo.title} (${difficulty}, ${assignedByText}, ${statusText})`;
        li.style.textDecoration = todo.completed ? "line-through" : "none";
        li.style.fontSize = "20px";

        // Toggle complete
        li.addEventListener("click", async () => {
          const desiredCompleted = (todo.completed || todo.completion_requested) ? false : true;
          try {
            const updateRes = await fetch(`/todos/${todo.id}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token
              },
              body: JSON.stringify({ title: todo.title, completed: desiredCompleted })
            });
            if (!updateRes.ok) {
              const errData = await updateRes.json().catch(() => ({}));
              errorMsg.textContent = errData.error || "Failed to update todo.";
              return;
            }
            {
              const updateData = await updateRes.json();
              const updatedLevel = Number(updateData.level);
              if (Number.isInteger(updatedLevel) && updatedLevel >= 1) {
                renderProgress(updateData);
              }
            }
            fetchTodos();
          } catch (err) {
            console.error(err);
          }
        });

        // Delete button
        const delBtn = document.createElement("button");
        delBtn.textContent = "🗑️";
        delBtn.style.marginLeft = "10px";
        delBtn.style.width = "50px";
        delBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          try {
            await fetch(`/todos/${todo.id}`, {
              method: "DELETE",
              headers: { Authorization: "Bearer " + token }
            });
            fetchTodos();
          } catch (err) {
            console.error(err);
          }
        });

        li.appendChild(delBtn);
        targetList.appendChild(li);
      }

      unfinished.forEach((todo) => renderItem(todo, todoListUnfinished));
      pendingApproval.forEach((todo) => renderItem(todo, todoListPendingApproval));
      finished.forEach((todo) => renderItem(todo, todoListFinished));
    }

    // Add new todo
    todoForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = todoInput.value.trim();
      if (!title) return;

      try {
        await fetch("/todos", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ title })
        });
        todoInput.value = "";
        fetchTodos();
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to add todo.";
      }
    });

    // Initial fetch
    fetchProgress();
    fetchTodos();
  </script>
  <script src="profile-menu.js"></script>
</body>
</html>
