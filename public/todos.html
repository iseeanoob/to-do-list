<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Todos | Node Docker App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 My Todos</h1>
    <p>Click a todo to toggle completion, or use the icon to remove it.</p>

    <form id="todoForm">
      <input type="text" id="todoInput" placeholder="New todo..." required />
      <button type="submit">Add Todo</button>
    </form>

    <h3>Unfinished</h3>
    <ul id="todoListUnfinished"></ul>
    <h3>Finished</h3>
    <ul id="todoListFinished"></ul>
    <p id="errorMsg" class="error"></p>
  </div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";
    }

    const todoListUnfinished = document.getElementById("todoListUnfinished");
    const todoListFinished = document.getElementById("todoListFinished");
    const todoForm = document.getElementById("todoForm");
    const todoInput = document.getElementById("todoInput");
    const errorMsg = document.getElementById("errorMsg");
    const MIN_ADMIN_ROLE_LEVEL = 4;
    const SUPERADMIN_ROLE_LEVEL = 5;

    // Decode token to get username/email
    function parseJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch (e) {
        return null;
      }
    }

    const user = parseJwt(token);
    if (!user) {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }

    async function fetchTodos() {
      try {
        const res = await fetch("/todos", {
          headers: { Authorization: "Bearer " + token }
        });
        const todos = await res.json();
        renderTodos(todos);
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to load todos.";
      }
    }

    function renderTodos(todos) {
      todoListUnfinished.innerHTML = "";
      todoListFinished.innerHTML = "";

      const unfinished = todos.filter((todo) => !todo.completed);
      const finished = todos.filter((todo) => Boolean(todo.completed));

      function renderItem(todo, targetList) {
        const li = document.createElement("li");
        const assignedByAdmin = Number(todo.assigned_by_role) >= MIN_ADMIN_ROLE_LEVEL;
        li.textContent = assignedByAdmin
          ? `${todo.title} (Assigned by ${Number(todo.assigned_by_role) === SUPERADMIN_ROLE_LEVEL ? "Superadmin" : "Admin"})`
          : todo.title;
        li.style.textDecoration = todo.completed ? "line-through" : "none";
        li.style.fontSize = "20px";

        // Toggle complete
        li.addEventListener("click", async () => {
          try {
            await fetch(`/todos/${todo.id}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token
              },
              body: JSON.stringify({ title: todo.title, completed: !todo.completed })
            });
            fetchTodos();
          } catch (err) {
            console.error(err);
          }
        });

        // Delete button
        const delBtn = document.createElement("button");
        delBtn.textContent = "🗑️";
        delBtn.style.marginLeft = "10px";
        delBtn.style.width = "50px";
        delBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          try {
            await fetch(`/todos/${todo.id}`, {
              method: "DELETE",
              headers: { Authorization: "Bearer " + token }
            });
            fetchTodos();
          } catch (err) {
            console.error(err);
          }
        });

        li.appendChild(delBtn);
        targetList.appendChild(li);
      }

      unfinished.forEach((todo) => renderItem(todo, todoListUnfinished));
      finished.forEach((todo) => renderItem(todo, todoListFinished));
    }

    // Add new todo
    todoForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = todoInput.value.trim();
      if (!title) return;

      try {
        await fetch("/todos", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ title })
        });
        todoInput.value = "";
        fetchTodos();
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Failed to add todo.";
      }
    });

    // Initial fetch
    fetchTodos();
  </script>
  <script src="profile-menu.js"></script>
</body>
</html>
