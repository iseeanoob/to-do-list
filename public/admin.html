<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | Node Docker App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
<div class="container">
  <h1>🛠 Admin Panel</h1>
  <div class="admin-top-actions">
    <button type="button" id="backToTodosBtn" class="back-to-todos-btn">⬅ Back to Todos</button>
  </div>
  <p id="adminInfo"></p>
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Todos</th>
        <th>Assign Todo</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>
  <h2>📬 Todo Requests</h2>
  <table>
    <thead>
      <tr>
        <th>Requested By</th>
        <th>Request</th>
        <th>Status</th>
        <th>Distribute</th>
      </tr>
    </thead>
    <tbody id="todoRequestsTable"></tbody>
  </table>
</div>

<script>
  const token = localStorage.getItem("token");
  const usersTable = document.getElementById("usersTable");
  const adminInfo = document.getElementById("adminInfo");
  const todoRequestsTable = document.getElementById("todoRequestsTable");
  const backToTodosBtn = document.getElementById("backToTodosBtn");
  const TODO_DIFFICULTIES = ["easy", "medium", "hard", "insane"];

  if (!token) window.location.href = "login.html";
  backToTodosBtn.addEventListener("click", () => {
    window.location.href = "todos.html";
  });

  const ROLES = {1: "User", 2: "Moderator", 3: "Manager", 4: "Admin", 5: "Superadmin"};

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function canManageUser(myRole, userRole) {
    return myRole >= 4 && myRole > userRole;
  }

  function canAssignTodo(myRole, userRole) {
    if (myRole === 5) return userRole <= 5;
    if (myRole === 4) return userRole <= 4;
    return false;
  }

  async function fetchUsersTodos() {
    try {
      const decoded = JSON.parse(atob(token.split('.')[1]));
      const myRole = Number(decoded.role);
      const [usersRes, requestsRes] = await Promise.all([
        fetch("/admin/users-todos", { headers: { Authorization: `Bearer ${token}` } }),
        fetch("/admin/todo-requests", { headers: { Authorization: `Bearer ${token}` } })
      ]);
      if (!usersRes.ok || !requestsRes.ok) throw new Error("Not authorized or failed to fetch data.");

      const users = await usersRes.json();
      const todoRequests = await requestsRes.json();

      adminInfo.textContent = `Logged in as: ${decoded.username} (Role: ${ROLES[myRole]} — Level ${myRole})`;

      usersTable.innerHTML = "";
      users.forEach(user => {
        const userRoleNum = Number(user.role); // ensure numeric
        const todosHTML = user.todos.length
          ? `<ul class="todo-list">${user.todos.map((todo) => {
              const isCompleted = Boolean(todo.completed);
              const isPendingApproval = !isCompleted && Boolean(todo.completion_requested);
              const statusText = isCompleted ? "approved" : (isPendingApproval ? "awaiting approval" : "open");
              const approveButton = (isPendingApproval && canAssignTodo(myRole, userRoleNum))
                ? ` <button class="action approve" data-action="approve-todo" data-todo-id="${todo.id}">✅ Approve</button>`
                : "";
              return `<li class="${isCompleted ? 'completed' : ''}">${escapeHtml(todo.title)} <small>(${escapeHtml(todo.difficulty || "easy")}, ${statusText})</small>${approveButton}</li>`;
            }).join('')}</ul>`
          : "<em>No todos</em>";

        let actionsHTML = "";
        if (canManageUser(myRole, userRoleNum)) {
          actionsHTML += `
            <div class="actions">
            <button class="action promote" data-action="promote" data-user-id="${user.id}" data-new-role="${userRoleNum + 1}" ${userRoleNum >= 5 ? "disabled" : ""}>⬆️ Promote</button>
            <button class="action demote" data-action="demote" data-user-id="${user.id}" data-new-role="${userRoleNum - 1}" ${userRoleNum <= 1 ? "disabled" : ""}>⬇️ Demote</button>
            <button class="action delete" data-action="delete" data-user-id="${user.id}">🗑 Delete</button>
            </div>
          `;
        } else {
          actionsHTML = "<em>Not allowed</em>";
        }

        const assignHTML = canAssignTodo(myRole, userRoleNum)
          ? `
            <div class="assign-wrap">
              <input class="assign-input" id="assignInput-${user.id}" type="text" placeholder="Todo for ${escapeHtml(user.username)}" />
              <select class="assign-difficulty" id="assignDifficulty-${user.id}">
                ${TODO_DIFFICULTIES.map((difficulty) => `<option value="${difficulty}">${difficulty}</option>`).join("")}
              </select>
              <button class="assign-btn" data-action="assign" data-user-id="${user.id}">Assign</button>
            </div>
          `
          : "<em>Not allowed</em>";

        usersTable.innerHTML += `
          <tr>
            <td>${escapeHtml(user.username)}</td>
            <td>${escapeHtml(user.email)}</td>
            <td>${ROLES[userRoleNum] || "Unknown"} (Level ${userRoleNum})</td>
            <td>${todosHTML}</td>
            <td>${assignHTML}</td>
            <td>${actionsHTML}</td>
          </tr>
        `;
      });

      renderTodoRequests(todoRequests, users, myRole);
    } catch (err) {
      console.error(err);
      alert("Error fetching admin data. Logging out.");
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }
  }

  function renderTodoRequests(todoRequests, users, myRole) {
    todoRequestsTable.innerHTML = "";
    todoRequests.forEach((request) => {
      const requestId = Number(request.id);
      const requesterRole = Number(request.requested_by_role || 1);
      const canDistributeTo = users.filter((user) => canAssignTodo(myRole, Number(user.role)));
      const distributeEnabled = request.status === "pending";
      const targetSelectHtml = canDistributeTo.length
        ? `<select id="requestTargetUser-${requestId}">
             ${canDistributeTo.map((user) => `<option value="${user.id}">${escapeHtml(user.username)} (role ${user.role})</option>`).join("")}
           </select>`
        : "<em>No eligible users</em>";
      const difficultySelectHtml = `
        <select id="requestDifficulty-${requestId}">
          ${TODO_DIFFICULTIES.map((difficulty) => `<option value="${difficulty}" ${difficulty === (request.difficulty || "easy") ? "selected" : ""}>${difficulty}</option>`).join("")}
        </select>
      `;
      const distributeButtonHtml = distributeEnabled && canDistributeTo.length
        ? `<button class="action assign" data-action="distribute-request" data-request-id="${requestId}">Distribute</button>`
        : "<em>Handled</em>";
      const statusText = request.status === "distributed"
        ? `distributed${request.distributed_todo_id ? ` (todo #${request.distributed_todo_id})` : ""}`
        : "pending";

      todoRequestsTable.innerHTML += `
        <tr>
          <td>${escapeHtml(request.requested_by_username)} (role ${requesterRole})</td>
          <td>${escapeHtml(request.title)} <small>(${escapeHtml(request.difficulty || "easy")})</small></td>
          <td>${escapeHtml(statusText)}</td>
          <td>${targetSelectHtml} ${difficultySelectHtml} ${distributeButtonHtml}</td>
        </tr>
      `;
    });
    if (todoRequests.length === 0) {
      todoRequestsTable.innerHTML = `<tr><td colspan="4"><em>No requests</em></td></tr>`;
    }
  }

  async function changeRole(userId, newRole) {
    if (newRole < 1 || newRole > 5) { alert("Role must be between 1 and 5."); return; }
    if (!confirm("Are you sure you want to change this user's role?")) return;

    try {
      const res = await fetch(`/admin/role/${userId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ newRole })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to change role.");
      alert(data.message);
      fetchUsersTodos();
    } catch (err) { alert(err.message); }
  }

  async function deleteUser(userId) {
    if (!confirm("Are you sure you want to delete this user?")) return;
    try {
      const res = await fetch(`/admin/users/${userId}`, { method: "DELETE", headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to delete user.");
      alert(data.message);
      fetchUsersTodos();
    } catch (err) { alert(err.message); }
  }

  async function assignTodo(userId) {
    const input = document.getElementById(`assignInput-${userId}`);
    const difficultyInput = document.getElementById(`assignDifficulty-${userId}`);
    const title = input.value.trim();
    const difficulty = (difficultyInput?.value || "").trim();
    if (!title) return alert("Please enter a todo title.");
    if (!TODO_DIFFICULTIES.includes(difficulty)) return alert("Please choose a valid difficulty.");

    try {
      const res = await fetch(`/admin/users/${userId}/todos`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ title, difficulty })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to assign todo.");
      input.value = "";
      alert(data.message || "Todo assigned.");
      fetchUsersTodos();
    } catch (err) {
      alert(err.message);
    }
  }

  async function approveTodo(todoId) {
    if (!confirm("Approve this todo as completed?")) return;
    try {
      const res = await fetch(`/admin/todos/${todoId}/approve`, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to approve todo.");
      alert(data.message || "Todo approved.");
      fetchUsersTodos();
    } catch (err) {
      alert(err.message);
    }
  }

  async function distributeTodoRequest(requestId) {
    const targetInput = document.getElementById(`requestTargetUser-${requestId}`);
    const difficultyInput = document.getElementById(`requestDifficulty-${requestId}`);
    const targetUserId = Number(targetInput?.value);
    const difficulty = String(difficultyInput?.value || "").trim().toLowerCase();
    if (!Number.isInteger(targetUserId) || targetUserId <= 0) return alert("Please select a valid target user.");
    if (!TODO_DIFFICULTIES.includes(difficulty)) return alert("Please choose a valid difficulty.");
    if (!confirm("Distribute this todo request?")) return;
    try {
      const res = await fetch(`/admin/todo-requests/${requestId}/distribute`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ targetUserId, difficulty })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to distribute todo request.");
      alert(data.message || "Todo request distributed.");
      fetchUsersTodos();
    } catch (err) {
      alert(err.message);
    }
  }

  usersTable.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-action]");
    if (!button || button.disabled) return;

    const action = button.dataset.action;
    if (action === "approve-todo") {
      const todoId = Number(button.dataset.todoId);
      if (!Number.isInteger(todoId) || todoId <= 0) return;
      approveTodo(todoId);
      return;
    }

    const userId = Number(button.dataset.userId);
    if (!Number.isInteger(userId) || userId <= 0) return;

    if (action === "promote" || action === "demote") {
      const newRole = Number(button.dataset.newRole);
      if (!Number.isInteger(newRole)) return;
      changeRole(userId, newRole);
      return;
    }
    if (action === "delete") {
      deleteUser(userId);
      return;
    }
    if (action === "assign") {
      assignTodo(userId);
      return;
    }
    console.warn("Unknown admin action encountered:", {
      action,
      userId,
      dataset: { ...button.dataset },
    });
  });

  todoRequestsTable.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-action]");
    if (!button || button.disabled) return;
    const action = button.dataset.action;
    if (action !== "distribute-request") return;
    const requestId = Number(button.dataset.requestId);
    if (!Number.isInteger(requestId) || requestId <= 0) return;
    distributeTodoRequest(requestId);
  });

  fetchUsersTodos();
</script>
<script src="profile-menu.js"></script>
</body>
</html>
