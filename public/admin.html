<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | Node Docker App</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f3f6fb; color: #1f2937; }
    .container { max-width: 1200px; margin: 24px auto; background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 10px 24px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { border: 1px solid #dbe2ef; padding: 10px; text-align: left; vertical-align: top; }
    th { background-color: #eef3ff; }
    .completed { text-decoration: line-through; color: #6b7280; }
    .todo-list { margin: 0; padding-left: 18px; }
    .actions { display: flex; flex-wrap: wrap; gap: 6px; }
    button.action, .assign-btn {
      margin: 0;
      padding: 7px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-size: 12px;
    }
    button.action:disabled, .assign-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .promote { background-color: #2e7d32; }
    .demote { background-color: #f57c00; }
    .delete { background-color: #d32f2f; }
    .assign-wrap { display: flex; gap: 6px; align-items: center; }
    .assign-input {
      width: 180px;
      padding: 7px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
    }
    .assign-btn { background: #2563eb; }
    #logoutBtn { margin-top: 20px; background: #111827; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <h1>🛠 Admin Panel</h1>
  <p id="adminInfo"></p>
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Todos</th>
        <th>Assign Todo</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>
  <button id="logoutBtn">Logout</button>
</div>

<script>
  const token = localStorage.getItem("token");
  const usersTable = document.getElementById("usersTable");
  const adminInfo = document.getElementById("adminInfo");
  const logoutBtn = document.getElementById("logoutBtn");

  if (!token) window.location.href = "login.html";

  const ROLES = {1: "User", 2: "Moderator", 3: "Manager", 4: "Admin", 5: "Superadmin"};

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function canManageUser(myRole, userRole) {
    return myRole >= 4 && myRole > userRole;
  }

  function canAssignTodo(myRole, userRole) {
    if (myRole === 5) return userRole < 5;
    if (myRole === 4) return userRole < 5;
    return false;
  }

  async function fetchUsersTodos() {
    try {
      const res = await fetch("/admin/users-todos", { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error("Not authorized or failed to fetch data.");

      const users = await res.json();
      const decoded = JSON.parse(atob(token.split('.')[1]));
      const myRole = Number(decoded.role);

      adminInfo.textContent = `Logged in as: ${decoded.username} (Role: ${ROLES[myRole]} — Level ${myRole})`;

      usersTable.innerHTML = "";
      users.forEach(user => {
        const userRoleNum = Number(user.role); // ensure numeric
        const todosHTML = user.todos.length
          ? `<ul class="todo-list">${user.todos.map(todo => `<li class="${todo.completed ? 'completed' : ''}">${escapeHtml(todo.title)}</li>`).join('')}</ul>`
          : "<em>No todos</em>";

        let actionsHTML = "";
        if (canManageUser(myRole, userRoleNum)) {
          actionsHTML += `
            <div class="actions">
            <button class="action promote" onclick="changeRole(${user.id}, ${userRoleNum + 1})" ${userRoleNum >= 5 ? "disabled" : ""}>⬆️ Promote</button>
            <button class="action demote" onclick="changeRole(${user.id}, ${userRoleNum - 1})" ${userRoleNum <= 1 ? "disabled" : ""}>⬇️ Demote</button>
            <button class="action delete" onclick="deleteUser(${user.id})">🗑 Delete</button>
            </div>
          `;
        } else {
          actionsHTML = "<em>Not allowed</em>";
        }

        const assignHTML = canAssignTodo(myRole, userRoleNum)
          ? `
            <div class="assign-wrap">
              <input class="assign-input" id="assignInput-${user.id}" type="text" placeholder="Todo for ${escapeHtml(user.username)}" />
              <button class="assign-btn" onclick="assignTodo(${user.id})">Assign</button>
            </div>
          `
          : "<em>Not allowed</em>";

        usersTable.innerHTML += `
          <tr>
            <td>${escapeHtml(user.username)}</td>
            <td>${escapeHtml(user.email)}</td>
            <td>${ROLES[userRoleNum] || "Unknown"} (Level ${userRoleNum})</td>
            <td>${todosHTML}</td>
            <td>${assignHTML}</td>
            <td>${actionsHTML}</td>
          </tr>
        `;
      });
    } catch (err) {
      console.error(err);
      alert("Error fetching admin data. Logging out.");
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }
  }

  async function changeRole(userId, newRole) {
    if (newRole < 1 || newRole > 5) { alert("Role must be between 1 and 5."); return; }
    if (!confirm("Are you sure you want to change this user's role?")) return;

    try {
      const res = await fetch(`/admin/role/${userId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ newRole })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to change role.");
      alert(data.message);
      fetchUsersTodos();
    } catch (err) { alert(err.message); }
  }

  async function deleteUser(userId) {
    if (!confirm("Are you sure you want to delete this user?")) return;
    try {
      const res = await fetch(`/admin/users/${userId}`, { method: "DELETE", headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to delete user.");
      alert(data.message);
      fetchUsersTodos();
    } catch (err) { alert(err.message); }
  }

  async function assignTodo(userId) {
    const input = document.getElementById(`assignInput-${userId}`);
    const title = input.value.trim();
    if (!title) return alert("Please enter a todo title.");

    try {
      const res = await fetch(`/admin/users/${userId}/todos`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ title })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to assign todo.");
      input.value = "";
      alert(data.message || "Todo assigned.");
      fetchUsersTodos();
    } catch (err) {
      alert(err.message);
    }
  }

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("token");
    window.location.href = "login.html";
  });

  fetchUsersTodos();
</script>
</body>
</html>
