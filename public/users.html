<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | Node Docker App</title>
  <link rel="stylesheet" href="style.css">
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; }
    .completed { text-decoration: line-through; color: gray; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠 Admin Panel</h1>
    <p id="adminInfo"></p>
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Todos</th>
        </tr>
      </thead>
      <tbody id="usersTable"></tbody>
    </table>
    <button id="logoutBtn">Logout</button>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const usersTable = document.getElementById("usersTable");
    const adminInfo = document.getElementById("adminInfo");
    const logoutBtn = document.getElementById("logoutBtn");

    if (!token) {
      window.location.href = "login.html";
    }

    async function fetchUsersTodos() {
      try {
        const res = await fetch("/admin/users-todos", {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) {
          throw new Error("Failed to fetch users or not authorized.");
        }

        const users = await res.json();

        usersTable.innerHTML = "";
        users.forEach(user => {
          const todosHTML = user.todos.length
            ? `<ul>${user.todos.map(todo => `<li class="${todo.completed ? 'completed' : ''}">${todo.title}</li>`).join('')}</ul>`
            : "<em>No todos</em>";

          usersTable.innerHTML += `
            <tr>
              <td>${user.username}</td>
              <td>${user.email}</td>
              <td>${user.role}</td>
              <td>${todosHTML}</td>
            </tr>
          `;
        });

        const decoded = JSON.parse(atob(token.split('.')[1]));
        adminInfo.textContent = `Logged in as: ${decoded.username} (Role: ${decoded.role})`;

      } catch (err) {
        console.error(err);
        alert("Error fetching admin data. Logging out.");
        localStorage.removeItem("token");
        window.location.href = "login.html";
      }
    }

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    });

    fetchUsersTodos();
  </script>
</body>
</html>
