name: Test og Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Viktig! Henter koden din
      - name: Sett opp Node/Python/Java
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test